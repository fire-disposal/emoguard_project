services:
  # ----------------------------------------------------
  # 1. Django Backend Service (backend)
  # ----------------------------------------------------
  backend:
    image: __IMAGE__
    container_name: emoguard-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      WECHAT_MINI_PROGRAM_APP_ID: ${WECHAT_MINI_PROGRAM_APP_ID}
      WECHAT_MINI_PROGRAM_APP_SECRET: ${WECHAT_MINI_PROGRAM_APP_SECRET}
      WECHAT_SUBSCRIPTION_TEMPLATES: ${WECHAT_SUBSCRIPTION_TEMPLATES}
      
      DATABASE_URL: postgresql://emoguard:${POSTGRES_PASSWORD}@db:5432/emoguard
      TZ: Asia/Shanghai

    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${HOST_APP_ROOT:-/var/www/emoguard}/media:/app/media
      - ${HOST_APP_ROOT:-/var/www/emoguard}/staticfiles:/app/staticfiles
    networks:
      - emoguard-net

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
      
  # ----------------------------------------------------
  # 2. PostgreSQL Database (db)
  # ----------------------------------------------------
  db:
    image: postgres:15
    container_name: emoguard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: emoguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: emoguard
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - emoguard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emoguard -d emoguard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ----------------------------------------------------
# Named Volumes and Network Configuration
# ----------------------------------------------------
volumes:
  pg_data:
    name: emoguard_pg_data

networks:
  emoguard-net:
    driver: bridge
