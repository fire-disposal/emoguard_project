name: Build & Deploy Backend Stack

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual deploy'

env:
  IMAGE_BASE: ghcr.io/${{ github.repository }}/emoguard-backend
  DEPLOY_ROOT: /var/www/emoguard



jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version Tag
        id: ver
        run: |
          set -euo pipefail
          TAG_SHORT=$(echo "${GITHUB_SHA:0:8}")
          TAG_FINAL="${TAG_SHORT:-latest}" 
          echo "IMAGE=${{ env.IMAGE_BASE }}:$TAG_FINAL" >> $GITHUB_OUTPUT
          echo "TAG=$TAG_FINAL" >> $GITHUB_OUTPUT

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.ver.outputs.IMAGE }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH Key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null" >> ~/.ssh/config

      - name: Render & Upload Stack Files
        run: |
          set -euo pipefail

          sed "s|__IMAGE__|${{ steps.ver.outputs.IMAGE }}|g" \
            docker-compose.yml > docker-compose.rendered.yml

          echo "📤 Uploading compose to server (server-side ~/.env is manually managed, untouched)..."
          scp -i ~/.ssh/id_rsa docker-compose.rendered.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/docker-compose.yml

      - name: Deploy Stack via SSH
        shell: bash
        run: |
          ssh -i ~/.ssh/id_rsa -T ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -euo pipefail

            echo "🔎 校验服务器 ~/.env (运行时密钥由服务器手动维护, CI 不再生成)..."
            if [ ! -f ~/.env ]; then
              echo "❌ ~/.env 不存在。请先在服务器创建并填入运行时密钥后重试。"
              exit 1
            fi
            for k in JWT_SIGNING_KEY SECRET_KEY POSTGRES_PASSWORD REDIS_PASSWORD \
                     DJANGO_SUPERUSER_USERNAME WECHAT_MINI_PROGRAM_APP_ID \
                     WECHAT_MINI_PROGRAM_APP_SECRET WECHAT_SUBSCRIPTION_TEMPLATES; do
              grep -q "^${k}=" ~/.env || { echo "❌ ~/.env 缺少必需键: ${k}"; exit 1; }
            done
            echo "✅ ~/.env 必需键齐全"

            echo "🔑 Docker登录..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "📥 拉取镜像..."
            docker compose -f ~/docker-compose.yml --env-file ~/.env pull
            
            echo "📂 确保挂载目录存在并设置权限..."
            # 尝试创建标准目录，如果失败则输出指导信息
            if sudo mkdir -p ${{ env.DEPLOY_ROOT }}/media ${{ env.DEPLOY_ROOT }}/staticfiles ${{ env.DEPLOY_ROOT }}/logs; then
                echo "✅ 目录已就绪: ${{ env.DEPLOY_ROOT }}"
                # 设置权限给当前用户或 docker 用户 (通常 uid 1000)
                sudo chown -R 1000:1000 ${{ env.DEPLOY_ROOT }} || echo "⚠️ 无法设置chown，可能需要手动介入"
                sudo chmod -R 775 ${{ env.DEPLOY_ROOT }} || echo "⚠️ 无法设置chmod"
            else
                echo "❌ 无法创建目录 ${{ env.DEPLOY_ROOT }}。"
                echo "👉 请登录服务器手动执行以下命令："
                echo "   sudo mkdir -p ${{ env.DEPLOY_ROOT }}/media ${{ env.DEPLOY_ROOT }}/staticfiles ${{ env.DEPLOY_ROOT }}/logs"
                echo "   sudo chown -R 1000:1000 ${{ env.DEPLOY_ROOT }}"
                echo "   sudo chmod -R 775 ${{ env.DEPLOY_ROOT }}"
                exit 1
            fi
            
            echo "�🔍 验证镜像:"
            docker images | grep emoguard || echo "⚠️ 未找到emoguard镜像"

            echo "🚀 停止旧容器..."
            docker compose -f ~/docker-compose.yml --env-file ~/.env down --remove-orphans
            
            echo "🚀 启动新容器..."
            docker compose -f ~/docker-compose.yml --env-file ~/.env up -d
            
            echo "⏳ 等待容器初始化..."
            sleep 10
            
            echo "📋 检查容器状态:"
            docker ps -a | grep emoguard || true

            echo "📋 检查端口监听:"
            ss -tlnp | grep :8000 || true

            echo "🔍 开始健康检查 (Max 20 attempts, 5s interval)..."
            health_check_passed=false
            for i in {1..20}; do
              if docker exec emoguard-backend curl -fsS http://localhost:8000/health/; then
                echo "✅ 健康检查通过"
                health_check_passed=true
                break
              fi
              echo "⏳ Health check $i/20 failed, waiting 5 seconds..."
              if [ $i -eq 5 ] || [ $i -eq 10 ] || [ $i -eq 15 ]; then
                echo "--- 诊断信息 ---"
                docker ps -a | grep emoguard
                docker compose logs backend --tail 50
                echo "----------------"
              fi
              sleep 5
            done

            if [ "$health_check_passed" != "true" ]; then
              echo "❌ 健康检查失败，收集最终诊断信息:"
              docker ps -a
              docker compose logs backend --tail 50
              docker compose logs db --tail 20
              docker compose logs redis --tail 20
              exit 1
            fi
            
            echo "📦 记录成功部署的版本..."
            echo "${{ steps.ver.outputs.TAG }}" > ~/last_successful_version.txt
            echo "✅ Deploy OK"
          EOF
      - name: ✅ Finish Deployment
        run: "echo \"🚀 Deploy finished — Image: ${{ steps.ver.outputs.IMAGE }}\""